name: Build Stock OnePlus 13 PJZ Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Create a release?'
        required: true
        type: boolean
        default: false
      optimize_level:
        description: "Compiler optimization level"
        required: true
        type: choice
        options: [O2, O3]
        default: O2
      clean_build:
        description: 'Clean build (no ccache)'
        type: boolean
        default: false

env:
  DEVICE_MODEL: OP13-PJZ
  DEVICE_SOC: sun
  DEVICE_BRANCH: wild/sm8750
  DEVICE_MANIFEST: oneplus_13_v.xml
  ANDROID_VERSION: android15
  KERNEL_VERSION: 6.6
  OS_VERSION: OOS15
  LTO_TYPE: thin

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      kernel_version: ${{ steps.kernel-info.outputs.kernel_full_ver }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            manifests/
          sparse-checkout-cone-mode: false

      - name: 🧹 Emergency Disk Cleanup
        run: |
          echo "::group::Disk Usage Before Cleanup"
          df -h
          echo "::endgroup::"

          echo "::group::Removing Unnecessary Software"
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          if command -v docker >/dev/null 2>&1; then
            docker rmi $(docker images -q) 2>/dev/null || true
          fi
          echo "::endgroup::"

          echo "::group::Disk Usage After Cleanup"
          df -h
          echo "::endgroup::"

      - name: Install Build Dependencies
        run: |
          set -euo pipefail
          echo "::group::Install dependencies"
          sudo apt-get -o Acquire::Retries=3 update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache jq bc
          sudo apt-get clean
          echo "✅ Dependencies installed"
          echo "::endgroup::"

      - name: Setup Repo Tool
        run: |
          REPO="/usr/local/bin/repo"
          curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
          echo "REPO=$REPO" >> "$GITHUB_ENV"

      - name: Optimize Git for Repo
        run: |
          git config --global feature.manyFiles true
          git config --global core.fsmonitor true
          git config --global pack.sparse true

      - name: 📥 Sync Kernel Source
        run: |
          set -euo pipefail
          echo "::group::Initialize and sync kernel source"

          mkdir -p kernel_build
          cd kernel_build

          # Copy manifest
          mkdir -p .repo/manifests
          cp "../manifests/oos15/${{ env.DEVICE_MANIFEST }}" .repo/manifests/temp_manifest.xml

          # Initialize repo
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "oneplus/sm8650" \
            -m temp_manifest.xml \
            --repo-rev=v2.16 \
            --depth=1 \
            --no-clone-bundle \
            --no-tags

          # Sync with retry
          success=false
          for i in 1 2 3; do
            if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch \
               -j"$(nproc --all)" --fail-fast; then
              success=true
              break
            fi
            echo "⚠️ repo sync attempt $i failed; retrying..."
            sleep 30
          done
          $success || { echo "::error::repo sync failed after 3 attempts"; exit 1; }

          echo "✅ Kernel source synced"
          echo "::endgroup::"

      - name: Set Environment Paths
        run: |
          KERNEL_DIR="$GITHUB_WORKSPACE/kernel_build"
          KERNEL_PLATFORM="$KERNEL_DIR/kernel_platform"
          COMMON_KERNEL="$KERNEL_PLATFORM/common"

          echo "KERNEL_DIR=$KERNEL_DIR" >> "$GITHUB_ENV"
          echo "KERNEL_PLATFORM=$KERNEL_PLATFORM" >> "$GITHUB_ENV"
          echo "COMMON_KERNEL=$COMMON_KERNEL" >> "$GITHUB_ENV"

      - name: 📊 Get Kernel Version Info
        id: kernel-info
        run: |
          set -euo pipefail
          cd "$COMMON_KERNEL"

          # Get branch info
          CONFIG_FILES=("build.config.common" "build.config.constants")
          BRANCH_LINE=""
          for f in "${CONFIG_FILES[@]}"; do
            if [ -f "$f" ]; then
              l=$(grep '^[[:space:]]*BRANCH=' "$f" || true)
              if [ -n "$l" ]; then BRANCH_LINE="$l"; break; fi
            fi
          done

          BRANCH_VALUE="${BRANCH_LINE#*=}"
          ANDROID_VER="${BRANCH_VALUE%-*}"

          # Get kernel version
          VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
          FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"

          KERNEL_FULL_VER="$ANDROID_VER-$FULL_VERSION"

          echo "KERNEL_FULL_VER=$KERNEL_FULL_VER" >> "$GITHUB_ENV"
          echo "ANDROID_VER=$ANDROID_VER" >> "$GITHUB_ENV"
          echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"

          echo "kernel_full_ver=$KERNEL_FULL_VER" >> "$GITHUB_OUTPUT"

          echo "✅ Detected kernel version: $KERNEL_FULL_VER"

      - name: 🏷️ Set Build Identity
        run: |
          echo "BUILD_USER=OnePlus" >> "$GITHUB_ENV"
          echo "BUILD_HOST=ubuntu-build" >> "$GITHUB_ENV"

      - name: Detect Clang Toolchain
        run: |
          set -euo pipefail
          echo "::group::Detect Clang"

          CLANG_FOUND=false
          for base in "$KERNEL_PLATFORM/prebuilts" "$KERNEL_PLATFORM/prebuilts-master"; do
            [ -d "$base/clang/host/linux-x86" ] || continue
            latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
            if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
              CLANG_BIN="$latest/bin"
              CLANG_FOUND=true
              break
            fi
          done

          if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
            CLANG_BIN="$(dirname "$(command -v clang)")"
            CLANG_FOUND=true
          fi

          $CLANG_FOUND || { echo "::error::No clang toolchain found"; exit 1; }

          echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"

          CLANG_VERSION="$("$CLANG_BIN/clang" --version | head -n1)"
          echo "CLANG_VERSION=$CLANG_VERSION" >> "$GITHUB_ENV"
          echo "✅ Detected Clang: $CLANG_VERSION"
          echo "::endgroup::"

      - name: Configure ccache
        if: ${{ inputs.clean_build != true }}
        run: |
          echo "::group::Configure ccache"
          export CCACHE_DIR="$HOME/.ccache"
          export CCACHE_MAXSIZE="1G"

          mkdir -p "$CCACHE_DIR"

          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          ccache -o compression_level=3
          ccache -o direct_mode=true
          ccache -o hash_dir=false
          ccache -o file_clone=true
          ccache -o inode_cache=true
          ccache -o umask=002
          ccache -o sloppiness=file_macro,time_macros,include_file_mtime,include_file_ctime,pch_defines,system_headers,locale

          echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"
          echo "✅ ccache configured"
          echo "::endgroup::"

      - name: Cache ccache
        if: ${{ inputs.clean_build != true }}
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-stock-${{ env.DEVICE_MODEL }}-${{ env.OS_VERSION }}-${{ env.KERNEL_FULL_VER }}
          restore-keys: |
            ccache-stock-${{ env.DEVICE_MODEL }}-${{ env.OS_VERSION }}-
            ccache-stock-${{ env.DEVICE_MODEL }}-

      - name: Disable ccache for clean build
        if: ${{ inputs.clean_build == true }}
        run: echo "CCACHE_DISABLE=1" >> "$GITHUB_ENV"

      - name: Clean Up ABI Protected Exports
        run: |
          cd "$KERNEL_PLATFORM"
          rm -f common/android/abi_gki_protected_exports_* || true
          rm -f msm-kernel/android/abi_gki_protected_exports_* || true
          sed -i 's/protected_modules = \[.*\]/protected_modules = []/' common/modules.bzl || true

      - name: 🔨 Build Kernel
        id: build
        run: |
          set -euo pipefail
          echo "::group::Build Kernel"

          cd "$KERNEL_PLATFORM"
          START_TIME=$(date +%s)

          # Set build environment
          export PATH="$CLANG_BIN_PATH:$PATH"
          export CC="ccache clang"
          export LLVM=1
          export LLVM_IAS=1
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          export BUILD_USER="${{ env.BUILD_USER }}"
          export BUILD_HOST="${{ env.BUILD_HOST }}"
          export LTO="${{ env.LTO_TYPE }}"
          export OPTIMIZE="${{ inputs.optimize_level }}"

          # Build defconfig
          python3 build/gki/build.py defconfig \
            --kernel_dir common \
            --out_dir out \
            --gki_defconfig common/arch/arm64/configs/gki_defconfig

          # Build kernel
          python3 build/gki/build.py build \
            --kernel_dir common \
            --out_dir out \
            --lto "$LTO" \
            --opt "$OPTIMIZE"

          END_TIME=$(date +%s)
          BUILD_TIME=$((END_TIME - START_TIME))

          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

          echo "✅ Kernel built successfully in ${BUILD_TIME}s"
          echo "::endgroup::"

      - name: 📦 Prepare Artifacts
        run: |
          set -euo pipefail
          echo "::group::Prepare artifacts"

          ARTIFACTS_DIR="$GITHUB_WORKSPACE/artifacts"
          mkdir -p "$ARTIFACTS_DIR"

          cd "$KERNEL_PLATFORM"

          # Copy kernel images
          cp out/dist/Image "$ARTIFACTS_DIR/"
          cp out/dist/Image.gz "$ARTIFACTS_DIR/" || true
          cp out/dist/gz-dtb "$ARTIFACTS_DIR/" || true

          # Copy kernel modules
          if [ -d "out/dist/modules" ]; then
            cp -r out/dist/modules "$ARTIFACTS_DIR/"
          fi

          # Copy System.map and other files
          cp out/dist/System.map "$ARTIFACTS_DIR/" || true
          cp out/dist/vmlinux "$ARTIFACTS_DIR/" || true

          # Calculate SHA256
          cd "$ARTIFACTS_DIR"
          sha256sum Image > Image.sha256

          echo "✅ Artifacts prepared"
          ls -la
          echo "::endgroup::"

      - name: 📥 Clone AnyKernel3
        run: |
          git clone --depth=1 -b gki-2.0 https://github.com/TheWildJames/AnyKernel3.git AnyKernel3

      - name: 📦 Create Flashable ZIP
        id: create_zip
        run: |
          set -euo pipefail
          echo "::group::Create flashable ZIP"

          cd AnyKernel3

          # Copy kernel image
          cp "$GITHUB_WORKSPACE/artifacts/Image" ./

          # Create info file
          cat > info.txt << EOF
          Device: ${{ env.DEVICE_MODEL }}
          OS Version: ${{ env.OS_VERSION }}
          Kernel Version: ${{ env.KERNEL_FULL_VER }}
          Clang: ${{ env.CLANG_VERSION }}
          Build Time: ${{ steps.build.outputs.build_time }}s
          Build Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Build Type: Stock (No KernelSU)
          EOF

          # Update anykernel3 info
          sed -i "s/string=.*;/string=${{ env.DEVICE_MODEL }} Stock Kernel ${{ env.KERNEL_FULL_VER }};/g" anykernel3/anykernel3.dtb

          # Create ZIP
          ZIP_NAME="${{ env.DEVICE_MODEL }}_stock_${{ env.OS_VERSION }}_$(date +%Y%m%d).zip"
          zip -r "../$ZIP_NAME" . -x ".git/*" -x "*.md"

          cd ..
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

          echo "✅ Created $ZIP_NAME ($(du -h "$ZIP_NAME" | cut -f1))"
          echo "::endgroup::"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DEVICE_MODEL }}-stock-kernel
          path: ${{ env.ZIP_NAME }}
          retention-days: 7

      - name: 📊 Build Summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF

          ## 🎯 Stock Kernel Build Summary

          **Device:** ${{ env.DEVICE_MODEL }}
          **OS Version:** ${{ env.OS_VERSION }}
          **Kernel Version:** ${{ env.KERNEL_FULL_VER }}
          **Clang Version:** ${{ env.CLANG_VERSION }}

          ### Build Configuration
          - **Optimization:** ${{ inputs.optimize_level }}
          - **LTO:** ${{ env.LTO_TYPE }}
          - **Clean Build:** ${{ inputs.clean_build }}
          - **Build Time:** ${{ steps.build.outputs.build_time }}s

          ### Output
          - **ZIP:** \`${{ env.ZIP_NAME }}\`

          EOF

      - name: 🧹 Cleanup
        if: always()
        run: |
          sudo rm -rf "$GITHUB_WORKSPACE/kernel_build" || true
          sudo rm -rf "$GITHUB_WORKSPACE/out" || true
          sudo rm -rf /tmp/* || true
          df -h /

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: ${{ inputs.make_release }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📥 Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: OP13-PJZ-stock-kernel
          path: ./artifacts

      - name: 🏷️ Create Tag
        run: |
          TAG="stock-v$(date +%Y%m%d-%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: 🚀 Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release_notes.md << 'EOF'
          # 📱 OnePlus 13 PJZ Stock Kernel

          > **Build Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          ## 📋 Details
          - **Device:** OP13-PJZ (Sun/SM8750)
          - **OS:** OxygenOS 15
          - **Kernel:** ${{ needs.build.outputs.kernel_version }}
          - **Type:** Stock (No KernelSU/SUSFS modifications)

          ## ⚠️ Disclaimer
          This is a **stock kernel** without any modifications.
          - No KernelSU/SUSFS
          - No BBG/BBR patches
          - Original OnePlus kernel configuration

          ## 📥 Installation
          1. Download the ZIP file
          2. Flash via Kernel Flasher or custom recovery
          3. Reboot

          EOF

          gh release create "${{ env.TAG }}" \
            --repo "${{ github.repository }}" \
            --title "Stock Kernel ${{ needs.build.outputs.kernel_version }}" \
            --notes-file release_notes.md \
            ./artifacts/*.zip

      - name: 📊 Release Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF

          ---

          ## 🎉 Release Created

          **Tag:** \`${{ env.TAG }}\`
          **URL:** ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.TAG }}

          EOF
